name: Flutter Release Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Patch blue_thermal_printer namespace
        run: dart tool/patch_blue_printer.dart

      - name: Increase Gradle Memory
        run: echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      # ✅ DECODE DEBUG KEYSTORE (the only keystore you need)
      - name: Decode debug keystore
        run: echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > android/app/debug.keystore

      # 🔥 BUILD SIGNED RELEASE APK (signed with debug keystore)
      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      # 🔥 RENAME APK TO DPOS_vX.Y.Z.apk
      - name: Rename APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          VERSION_NAME=${VERSION%%+*}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/DPOS_v${VERSION_NAME}.apk

      # 🔥 BUILD SIGNED AAB (also signed with debug keystore)
      - name: Build AAB (release)
        run: flutter build appbundle --release --no-tree-shake-icons

      # 🔥 UPLOAD APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DPOS-apk
          path: build/app/outputs/flutter-apk/DPOS_*.apk

      # 🔥 UPLOAD AAB
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
